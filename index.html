<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name | Engineering Portfolio</title>
    <style>
        /* Dark Mode Styling */
        :root {
            --bg-color: #0d1117;
            --card-bg-color: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --title-color: #ffffff;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }

        /* Top Header Area (Matching Branden's) */
        header {
            text-align: center;
            padding: 2.5rem 1rem;
            max-width: 800px;
            margin: auto;
        }

        header img {
            width: 130px;
            height: 130px;
            border-radius: 50%; /* Circle shape */
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 4px solid var(--accent-color);
        }

        header h1 {
            color: var(--title-color);
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
        }

        header p {
            color: #8b949e;
            font-size: 0.95rem;
            margin-top: 0.2rem;
            margin-bottom: 1.5rem;
        }

        /* Essential Contacts Below Name */
        header a {
            color: var(--text-color);
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
        }
        header a:hover { color: var(--accent-color); }

        /* The Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 cards per row */
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto 3rem auto;
            padding: 0 1rem;
        }

        /* The Card */
        .card {
            background-color: var(--card-bg-color);
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 1 / 1; /* Makes them squares */
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
        }
        .card:hover {
            transform: scale(1.02); /* Pop out slightly */
        }

        /* The Image on the Card */
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* The Dark Overlay/Label */
        .card .overlay {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); /* Semi-transparent black */
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* Minimal Footer */
        footer {
            text-align: center;
            color: #6e7681;
            padding: 1.5rem;
            font-size: 0.8rem;
        }
        
    </style>
</head>
<body>

    <header>
        <img src="https://github.com/simrvirk/simrvirk.github.io/blob/c093b5704e8d4cfa4631180913ce1361a15e87fd/assets/img/1732602812141.jpg" alt="Profile Picture">
        <h1>Simr Virk</h1>
        <p>Fourth Year Engineering Student | Mechatronic Systems Engineering</p>
        <div>
            <a href="your_linkedin_url" target="_blank">LinkedIn</a> • 
            <a href="mailto:your@email.com">Email</a> • 
            <a href="your_resume_link.pdf" target="_blank">Resume</a>
        </div>
    </header>

    <div class="grid-container">
        
        <div class="card" onclick="location.href='https://google.com';">
            <img src="https://images.unsplash.com/photo-1593340020523-d306a4f2795f?q=80&w=600" alt="Motorola Logo">
            <div class="overlay">Internship: Project One</div>
        </div>

        <div class="card" onclick="location.href='https://google.com';">
            <img src="https://images.unsplash.com/photo-1558981285-6f0c94958bb6?q=80&w=600" alt="Robotics Project">
            <div class="overlay">Autonomous Robot</div>
        </div>

        <div class="card" onclick="location.href='https://google.com';">
            <img src="https://images.unsplash.com/photo-1518118014498-f5445258f4a1?q=80&w=600" alt="CAD Drawing">
            <div class="overlay">CAD: 12-Speed Gearbox</div>
        </div>
        
        </div>

    <footer>
        &copy; 2023 Your Name. Built with Gemini & GitHub Pages.
    </footer>

</body>
</html>
